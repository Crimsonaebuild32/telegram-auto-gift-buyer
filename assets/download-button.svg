<svg width="400" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Button background -->
  <rect x="10" y="10" width="380" height="60" rx="30" fill="url(#buttonGradient)" filter="url(#shadow)"/>

  <!-- Windows icon -->
  <g transform="translate(40, 25)">
    <rect x="0" y="0" width="12" height="12" fill="#ffffff"/>
    <rect x="14" y="0" width="12" height="12" fill="#ffffff"/>
    <rect x="0" y="14" width="12" height="12" fill="#ffffff"/>
    <rect x="14" y="14" width="12" height="12" fill="#ffffff"/>
  </g>

  <!-- Download icon -->
  <g transform="translate(330, 25)">
    <path d="M 15 0 L 15 15 L 10 15 L 20 25 L 30 15 L 25 15 L 25 0 Z" fill="#ffffff"/>
    <rect x="5" y="28" width="30" height="4" rx="2" fill="#ffffff"/>
  </g>

  <!-- Button text -->
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    DOWNLOAD FOR WINDOWS
  </text>
  <text x="200" y="55" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Version 2.0.0 • Free • 15.2 MB • Windows 10/11
  </text>
</svg>